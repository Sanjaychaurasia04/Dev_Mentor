<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevMentor — Learn to Code. For India.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #080810;
      --surface-1: #0f0f1a;
      --surface-2: #16162a;
      --surface-3: #1e1e35;
      --surface-4: #262640;

      --orange: #f97316;
      --orange-light: #fb923c;
      --orange-dim: rgba(249, 115, 22, 0.15);

      --teal: #14b8a6;
      --teal-light: #2dd4bf;
      --teal-dim: rgba(20, 184, 166, 0.12);

      --red: #ef4444;
      --yellow: #eab308;
      --violet: #8b5cf6;
      --green: #22c55e;

      --border: rgba(255, 255, 255, 0.07);
      --border-strong: rgba(255, 255, 255, 0.14);

      --text: #e8e4f0;
      --text-muted: #7c78a0;
      --text-faint: #3d3a55;

      --font-ui: 'Outfit', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-devanagari: 'Noto Sans Devanagari', sans-serif;

      --radius: 12px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--black);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* scrollbar */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--surface-4) transparent;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 4px; }

    /* subtle dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 10%, black 20%, transparent 80%);
    }

    /* ---- Glow blobs ---- */
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-blobs span {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.06;
      animation: blobDrift 22s ease-in-out infinite;
    }
    .bg-blobs span:nth-child(1) {
      width: 500px; height: 500px;
      background: var(--orange);
      top: -15%; left: -10%;
      animation-delay: 0s;
    }
    .bg-blobs span:nth-child(2) {
      width: 420px; height: 420px;
      background: var(--teal);
      top: 35%; right: -12%;
      animation-delay: 8s;
    }
    .bg-blobs span:nth-child(3) {
      width: 360px; height: 360px;
      background: var(--violet);
      bottom: -10%; left: 42%;
      animation-delay: 16s;
    }

    @keyframes blobDrift {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(40px, -30px); }
      66% { transform: translate(-25px, 40px); }
    }

    /* ---- Typography ---- */
    h1, h2, h3, h4 {
      font-family: var(--font-ui);
      font-weight: 700;
      line-height: 1.2;
    }

    /* ---- Layout ---- */
    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ---- Buttons ---- */
    button {
      font-family: var(--font-ui);
      cursor: pointer;
      border: none;
      outline: none;
      transition: all 0.18s ease;
    }
    button:active {
      transform: scale(0.97);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-size: 13.5px;
      white-space: nowrap;
    }

    .btn-orange {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 0 0 1px rgba(249,115,22,0.3), 0 4px 16px rgba(249,115,22,0.25);
    }
    .btn-orange:hover {
      background: var(--orange-light);
      box-shadow: 0 0 0 1px rgba(249,115,22,0.4), 0 8px 24px rgba(249,115,22,0.35);
      transform: translateY(-1px);
    }

    .btn-teal {
      background: var(--teal);
      color: #080810;
      font-weight: 700;
      box-shadow: 0 0 0 1px rgba(20,184,166,0.3), 0 4px 16px rgba(20,184,166,0.2);
    }
    .btn-teal:hover {
      background: var(--teal-light);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-ghost:hover {
      background: var(--surface-3);
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-muted);
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
    }
    .btn-outline:hover {
      border-color: var(--teal);
      color: var(--teal);
    }

    .btn-sm {
      padding: 7px 14px;
      font-size: 12.5px;
    }

    /* ---- Cards ---- */
    .card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: var(--border-strong);
    }

    /* ---- Tags / badges ---- */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 9px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .tag-orange { background: var(--orange-dim); color: var(--orange-light); border: 1px solid rgba(249,115,22,0.25); }
    .tag-teal   { background: var(--teal-dim);   color: var(--teal-light);   border: 1px solid rgba(20,184,166,0.22); }
    .tag-red    { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.22); }
    .tag-yellow { background: rgba(234,179,8,0.1); color: #fde047; border: 1px solid rgba(234,179,8,0.22); }
    .tag-violet { background: rgba(139,92,246,0.1); color: #a78bfa; border: 1px solid rgba(139,92,246,0.22); }
    .tag-green  { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.22); }
    .tag-muted  { background: var(--surface-3); color: var(--text-muted); border: 1px solid var(--border); }

    /* ---- Progress bars ---- */
    .progress-track {
      height: 4px;
      background: var(--surface-3);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1.2s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .xp-track {
      height: 6px;
      background: var(--surface-3);
      border-radius: 4px;
      overflow: hidden;
    }
    .xp-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--teal), var(--violet));
      box-shadow: 0 0 10px rgba(20,184,166,0.4);
      transition: width 1.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* ---- Inputs ---- */
    input, textarea, select {
      font-family: var(--font-ui);
      font-size: 13.5px;
      background: var(--surface-2);
      border: 1.5px solid var(--border-strong);
      color: var(--text);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: rgba(20,184,166,0.5);
      box-shadow: 0 0 0 3px rgba(20,184,166,0.07);
    }
    select option {
      background: var(--surface-2);
    }

    /* ---- Navbar ---- */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(8, 8, 16, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .navbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      height: 58px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-right: 20px;
      background: none;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    .nav-logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--orange), #c2410c);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      box-shadow: 0 0 16px rgba(249,115,22,0.35);
    }
    .nav-logo-text {
      text-align: left;
    }
    .nav-logo-text .name {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .nav-logo-text .sub {
      font-family: var(--font-mono);
      font-size: 7.5px;
      color: var(--orange-light);
      letter-spacing: 0.2em;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover {
      background: var(--surface-2);
      color: var(--text);
    }
    .nav-link.active {
      background: rgba(249,115,22,0.1);
      color: var(--orange-light);
      border: 1px solid rgba(249,115,22,0.18);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .streak-badge {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .streak-badge .count {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--orange-light);
    }

    .xp-display {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .xp-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal), var(--violet));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      box-shadow: 0 0 10px rgba(20,184,166,0.3);
    }
    .xp-text {
      font-family: var(--font-mono);
      font-size: 11.5px;
      font-weight: 600;
      color: var(--teal);
      line-height: 1;
    }
    .xp-level {
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--text-faint);
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), #dc2626);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px var(--black), 0 0 0 4px rgba(249,115,22,0.35);
    }

    /* ---- Language picker ---- */
    .lang-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn:hover {
      background: var(--surface-3);
      color: var(--text);
    }

    .lang-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--surface-1);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 6px;
      z-index: 200;
      min-width: 155px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    }
    .lang-option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 7px 11px;
      border-radius: 6px;
      background: none;
      border: none;
      font-size: 12.5px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .lang-option:hover {
      background: var(--surface-3);
      color: var(--text);
    }
    .lang-option.selected {
      background: var(--surface-2);
      color: var(--teal);
    }

    /* ---- Sidebar ---- */
    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 9px 11px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    .sidebar-btn:hover {
      background: var(--surface-2);
      color: var(--text);
    }
    .sidebar-btn.active {
      background: var(--teal-dim);
      color: var(--teal-light);
      border: 1px solid rgba(20,184,166,0.2);
    }

    /* ---- Chat bubbles ---- */
    .bubble-user {
      background: linear-gradient(135deg, var(--orange), #c2410c);
      color: #fff;
      padding: 11px 16px;
      border-radius: 18px 18px 4px 18px;
      max-width: 75%;
      margin-left: auto;
      font-size: 13.5px;
      line-height: 1.6;
      box-shadow: 0 4px 16px rgba(249,115,22,0.25);
      word-break: break-word;
    }
    .bubble-ai {
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      color: var(--text);
      padding: 11px 16px;
      border-radius: 18px 18px 18px 4px;
      max-width: 85%;
      font-size: 13.5px;
      line-height: 1.65;
      word-break: break-word;
    }

    /* ---- Code editor ---- */
    .code-editor {
      background: #06060e;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 12.5px;
      line-height: 1.85;
      color: #9effd8;
      padding: 18px;
      resize: none;
      width: 100%;
      outline: none;
      transition: border-color 0.18s;
    }
    .code-editor:focus {
      border-color: rgba(20,184,166,0.35);
    }

    /* ---- Toast ---- */
    .toast-wrap {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9000;
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 275px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.65);
      animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ---- Confetti pieces ---- */
    .confetti-piece {
      position: fixed;
      top: -10px;
      border-radius: 2px;
      animation: confettiFall linear both;
      z-index: 9999;
      pointer-events: none;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(105vh) rotate(720deg); }
    }

    /* ---- Loader dots ---- */
    .loader-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .loader-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
      animation: dotBounce 1.4s ease-in-out infinite;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.16s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ---- Spinner ---- */
    .spinner {
      width: 22px;
      height: 22px;
      border: 2.5px solid var(--border-strong);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ---- Page animations ---- */
    .fade-in {
      animation: pageFadeIn 0.3s ease both;
    }
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- Dashboard specific ---- */
    .hero-section {
      background: linear-gradient(135deg, rgba(249,115,22,0.06), rgba(139,92,246,0.04), rgba(20,184,166,0.05));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 40px 44px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .hero-section::before {
      content: '';
      position: absolute;
      top: -80px;
      right: 80px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249,115,22,0.1), transparent 65%);
      pointer-events: none;
    }
    .hero-section::after {
      content: '';
      position: absolute;
      bottom: -50px;
      left: 45%;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(20,184,166,0.08), transparent 65%);
      pointer-events: none;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-3px);
      border-color: var(--border-strong);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }

    .path-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .path-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      cursor: pointer;
      background: var(--surface-1);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }
    .path-card:hover {
      transform: translateY(-3px);
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 330px;
      gap: 20px;
    }

    .right-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ---- Activity feed ---- */
    .activity-row {
      display: flex;
      gap: 11px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
      transition: padding-left 0.15s;
    }
    .activity-row:last-child { border-bottom: none; }
    .activity-row:hover { padding-left: 4px; }

    /* ---- Quick actions ---- */
    .quick-action {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 10px 14px;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.14s;
      text-align: left;
    }
    .quick-action:first-of-type { border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
    .quick-action:last-of-type  { border-bottom: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
    .quick-action:hover {
      background: var(--surface-2);
      color: var(--text);
      padding-left: 18px;
    }

    /* ---- Module list ---- */
    .module-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .module-row:hover { background: rgba(255,255,255,0.025); }
    .module-row:last-child { border-bottom: none; }

    /* ---- Leaderboard ---- */
    .lb-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      transition: background 0.12s;
      cursor: pointer;
      margin-bottom: 2px;
    }
    .lb-row:hover { background: var(--surface-2); }

    /* ---- Code review pane tabs ---- */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 4px;
      flex-shrink: 0;
    }
    .tab-btn {

      border: none;

      font-weight: 600;

      border-bottom: 2px solid transparent;

      color: var(--text-faint);
      font-weight: 600;
      margin-bottom: 5px;

      background: linear-gradient(135deg, var(--orange), #fbbf24, #ef4444);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease infinite;
    }
    .text-gradient-teal {
      background: linear-gradient(135deg, var(--teal), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }

    .toggle-switch {
      position: relative;
      width: 34px;
      height: 18px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      transition: background 0.2s;

    .toggle-knob {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      top: 3px;

  </style>
</head>

client = razorpay.Client(

def create_upi_order(amount_inr: int, customer_id: str) -> dict:

  // ----- AI Mentor page -----
  function MentorPage({ lang, showToast }) {
    const langInfo = LANGUAGES.find(l => l.code === lang) || LANGUAGES[0];

    const [messages, setMessages] = useState([{
      role: 'assistant',
      text: 'Namaste! I am DevMentor, your AI coding companion built for Indian developers.\n\nAsk me anything in English or your preferred Indian language: code questions, debugging, interview prep, or career advice.\n\nI will explain things using examples from Zomato, Razorpay, UPI, Flipkart — the real Indian tech world.\n\nWhat are you working on?',
    }]);

    const [input, setInput] = useState('');
    const [loading, setLoading] = useState(false);
    const [bharatMode, setBharatMode] = useState(false);
    const [voiceActive, setVoiceActive] = useState(false);
    const messagesEndRef = useRef(null);
    const inputRef = useRef(null);

    useEffect(() => {
      messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
    }, [messages, loading]);

    const suggestedQuestions = [
      'Explain closures using a chai stall analogy',
      'How does UPI work under the hood?',
      'Debug my React useEffect issue',
      'Best AWS services for a fintech startup?',
      'Prep me for a Razorpay interview',
      'Explain async and await in Hindi',
      'System design for Swiggy at scale',
      'Kotlin vs Flutter for my startup',
    ];

    async function sendMessage() {
      if (!input.trim() || loading) return;

      const userText = input.trim();
      setInput('');

      const newMessages = [...messages, { role: 'user', text: userText }];
      setMessages(newMessages);
      setLoading(true);

      const history = newMessages.map(m => ({ role: m.role, content: m.text }));

      const systemPrompt = `You are DevMentor, an expert coding mentor for Indian software developers.

Personality: You are like a brilliant senior engineer at a top Indian startup — warm, direct, practical, and genuinely invested in helping the learner grow. You are not a chatbot. You are a mentor.

${bharatMode ? 'IMPORTANT: The user has enabled Bharat Mode. Use more Hindi phrases and words naturally mixed with English throughout your responses. For example, "Yaar, iska matlab ye hai ki..." or "Bahut achha question hai, lekin..." Keep technical terms in English.' : ''}

Guidelines:
- If the user writes in Hindi or any Indian language, reply naturally in that same language, mixing in English technical terms where appropriate.
- Use India-relevant examples: Flipkart catalog, Razorpay checkout flow, Zomato order tracking, UPI transactions, Aadhaar verification, IRCTC booking — wherever it fits.
- Explain WHY something works, not just WHAT it is. Create the "aha moment."
- For short questions, respond in prose. For complex topics, use clear structure with headings.
- Show concise, runnable code snippets. Only include the important parts.
- Never start with hollow filler phrases. Get to the point immediately.
- End with a practical next step or a follow-up question.
- Current language preference: ${langInfo.label} (${langInfo.native})`;

      const reply = await callClaude(systemPrompt, history);

      setMessages(prev => [...prev, { role: 'assistant', text: reply }]);
      showToast({ icon: '✨', title: 'XP Earned', subtitle: 'Learning session', xpGain: '+18 XP', color: 'var(--teal-light)' });
      setLoading(false);
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function renderMarkdown(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--teal-light)">$1</strong>')
        .replace(/`([^`]+)`/g, '<code style="font-family:var(--font-mono);font-size:11px;background:rgba(20,184,166,0.1);padding:2px 6px;border-radius:4px;color:var(--teal-light)">$1</code>')
        .replace(/\n/g, '<br>');
    }

    function toggleVoice() {
      const next = !voiceActive;
      setVoiceActive(next);
      showToast({
        icon: next ? '🎤' : '🔇',
        title: next ? 'Voice mode on' : 'Voice mode off',
        subtitle: next ? 'Speak your question' : 'Back to typing',
      });
    }

    return (
      <div style={{ display: 'flex', height: 'calc(100vh - 58px)', marginTop: 58, position: 'relative', zIndex: 1 }}>
        {/* Sidebar */}
        <div style={{
          width: 248,
          borderRight: '1px solid var(--border)',
          display: 'flex',
          flexDirection: 'column',
          padding: '16px 12px',
          background: 'rgba(8,8,16,0.7)',
          overflowY: 'auto',
          flexShrink: 0,
        }}>
          {/* Mentor info */}
          <div style={{
            background: 'rgba(20,184,166,0.07)',
            border: '1px solid rgba(20,184,166,0.18)',
            borderRadius: 12,
            padding: 14,
            marginBottom: 18,
          }}>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 8, color: 'var(--teal)', letterSpacing: '0.12em', marginBottom: 5, fontWeight: 700 }}>
              YOUR AI MENTOR
            </div>
            <div style={{ fontWeight: 700, fontSize: 14.5, marginBottom: 6 }}>DevMentor AI</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 12 }}>
              <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--teal)', boxShadow: '0 0 6px var(--teal)' }} />
              <span style={{ fontSize: 11, color: 'var(--teal)', fontFamily: 'var(--font-mono)' }}>Online</span>
            </div>

            {/* Bharat mode toggle */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--orange-light)' }}>Bharat Mode</div>
                <div style={{ fontSize: 9.5, color: 'var(--text-faint)' }}>Mix Hindi in replies</div>
              </div>
              <button
                onClick={() => setBharatMode(v => !v)}
                style={{
                  background: bharatMode ? 'var(--orange)' : 'var(--surface-4)',
                  border: `1px solid ${bharatMode ? 'rgba(249,115,22,0.4)' : 'var(--border-strong)'}`,
                }}
                className="toggle-switch"
              >
                <div className="toggle-knob" style={{ left: bharatMode ? 18 : 3 }} />
              </button>
            </div>
          </div>

          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 8, color: 'var(--text-faint)', letterSpacing: '0.12em', marginBottom: 8, fontWeight: 700 }}>
            TRY ASKING
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {suggestedQuestions.map((q, i) => (
              <button
                key={i}
                onClick={() => { setInput(q); inputRef.current?.focus(); }}
                style={{
                  background: 'none',
                  border: '1px solid var(--border)',
                  borderRadius: 8,
                  padding: '7px 10px',
                  fontSize: 11,
                  color: 'var(--text-muted)',
                  cursor: 'pointer',
                  textAlign: 'left',
                  lineHeight: 1.5,
                  transition: 'all 0.12s',
                }}
                onMouseEnter={e => {
                  e.currentTarget.style.borderColor = 'rgba(20,184,166,0.4)';
                  e.currentTarget.style.background = 'rgba(20,184,166,0.05)';
                  e.currentTarget.style.color = 'var(--text)';
                }}
                onMouseLeave={e => {
                  e.currentTarget.style.borderColor = 'var(--border)';
                  e.currentTarget.style.background = 'none';
                  e.currentTarget.style.color = 'var(--text-muted)';
                }}
              >
                {q}
              </button>
            ))}
          </div>

          <div style={{ flex: 1 }} />

          <div style={{ padding: 10, background: 'var(--surface-2)', borderRadius: 9, border: '1px solid var(--border)', marginTop: 12 }}>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 8, color: 'var(--text-faint)', marginBottom: 4, letterSpacing: '0.12em', fontWeight: 700 }}>
              LANGUAGE
            </div>
            <div style={{
              fontSize: 14,
              fontFamily: lang !== 'en' ? 'var(--font-devanagari)' : 'var(--font-ui)',
              color: 'var(--text)',
              fontWeight: 600,
            }}>
              {langInfo.native}
            </div>
          </div>
        </div>

        {/* Chat area */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>

          <div style={{

            borderBottom: '1px solid var(--border)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            background: 'rgba(8,8,16,0.65)',
            backdropFilter: 'blur(14px)',
            flexShrink: 0,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
              <div style={{
                width: 38, height: 38, borderRadius: '50%',
                background: 'linear-gradient(135deg, var(--teal), var(--violet))',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 17, boxShadow: '0 0 14px rgba(20,184,166,0.35)',
              }}>🤖</div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14 }}>DevMentor AI</div>
                <div style={{ fontSize: 10.5, color: 'var(--teal)', fontFamily: 'var(--font-mono)' }}>
                  Multilingual — India-first — Powered by Claude
                </div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 7, alignItems: 'center' }}>
              <span className="tag tag-teal">10 Languages</span>
              {bharatMode && <span className="tag tag-orange">Bharat Mode</span>}
              <button className={`voice-btn ${voiceActive ? 'recording' : ''}`} onClick={toggleVoice} title="Toggle voice mode">
                {voiceActive ? '🔴' : '🎤'}

            </div>
          </div>

          {/* Messages */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '20px', display: 'flex', flexDirection: 'column', gap: 14 }}>
            {messages.map((msg, i) => (
              <div

            {loading && (

                  width: 26, height: 26, borderRadius: '50%',
                  background: 'linear-gradient(135deg, var(--teal), var(--violet))',

            {LEARNING_PATHS.map(path => {
              const curriculum = CURRICULUM[path.id] || [];
              const totalCount = curriculum.reduce((n, s) => n + s.lessons.length, 0);
              const pct = Math.round(path.xp / path.totalXp * 100);
              return (
                <div
                  key={path.id}
                  className="card"
                  style={{ cursor: 'pointer', padding: 28, borderColor: `${path.color}22`, transition: 'all 0.2s' }}
                  onClick={() => {
                    setSelectedPath(path);
                    const first = curriculum[0]?.lessons[0];
                    if (first) openLesson(path, first);
                  }}
                  onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-4px)'; e.currentTarget.style.boxShadow = `0 20px 48px ${path.color}20`; }}
                  onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = ''; }}
                >
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
                    <div style={{ fontSize: 40 }}>{path.emoji}</div>
                    {path.done > 0 && <span className="tag tag-teal">In Progress</span>}
                  </div>
                  <div style={{ fontWeight: 800, fontSize: 19, marginBottom: 5, letterSpacing: '-0.02em', lineHeight: 1.25 }}>{path.title}</div>
                  <div style={{ fontSize: 12.5, color: 'var(--text-faint)', marginBottom: 18 }}>{path.subtitle}</div>

                  {/* Sections preview */}
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginBottom: 18 }}>
                    {curriculum.slice(0, 3).map((sec, i) => (
                      <span key={i} style={{ fontSize: 10.5, padding: '3px 9px', borderRadius: 6, background: `${sec.color}15`, color: sec.color, border: `1px solid ${sec.color}25`, fontWeight: 600 }}>
                        {sec.section}
                      </span>
                    ))}
                    {curriculum.length > 3 && (
                      <span style={{ fontSize: 10.5, padding: '3px 9px', borderRadius: 6, background: 'var(--surface-3)', color: 'var(--text-faint)' }}>+{curriculum.length - 3} more</span>
                    )}
                  </div>

                  <div className="progress-track" style={{ marginBottom: 8 }}>
                    <div className="progress-fill" style={{ width: `${pct}%`, background: `linear-gradient(90deg, ${path.color}, ${path.color}99)` }} />
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: 'var(--font-mono)', fontSize: 9.5, color: 'var(--text-faint)' }}>
                    <span>{totalCount} lessons</span>
                    <span style={{ color: path.color, fontWeight: 700 }}>{pct}% done</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // Full tutorial layout
    const curriculum = CURRICULUM[selectedPath.id] || [];

    return (
      <div style={{ display: 'flex', height: 'calc(100vh - 58px)', marginTop: 58, position: 'relative', zIndex: 1 }}>

        {/* LEFT SIDEBAR — module list like W3Schools */}
        <div style={{
          width: 270,
          borderRight: '1px solid var(--border)',
          background: 'rgba(8,8,16,0.85)',
          display: 'flex',
          flexDirection: 'column',
          overflowY: 'auto',
          flexShrink: 0,
        }}>
          {/* Back + course header */}
          <div style={{ padding: '14px 14px 10px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
            <button
              onClick={() => { setSelectedPath(null); setActiveLessonId(null); }}
              style={{ background: 'none', border: 'none', color: 'var(--text-muted)', fontSize: 12.5, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5, marginBottom: 12, padding: 0, fontFamily: 'var(--font-ui)' }}
            >
              &larr; All Courses
            </button>
            <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 10 }}>
              <span style={{ fontSize: 22 }}>{selectedPath.emoji}</span>
              <div>
                <div style={{ fontWeight: 800, fontSize: 14, lineHeight: 1.2 }}>{selectedPath.title}</div>
                <div style={{ fontSize: 10.5, color: 'var(--text-faint)', marginTop: 2 }}>{totalLessons} lessons</div>
              </div>
            </div>
            {/* Overall progress */}
            <div style={{ marginBottom: 6 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: 'var(--text-faint)' }}>{doneCount}/{totalLessons} complete</span>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: selectedPath.color, fontWeight: 700 }}>{totalLessons > 0 ? Math.round(doneCount / totalLessons * 100) : 0}%</span>
              </div>
              <div className="progress-track">
                <div className="progress-fill" style={{ width: `${totalLessons > 0 ? Math.round(doneCount / totalLessons * 100) : 0}%`, background: selectedPath.color }} />
              </div>
            </div>
          </div>

          {/* Sections and lessons */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '8px 0' }}>
            {curriculum.map((section, si) => (
              <div key={si}>
                {/* Section header */}
                <div style={{
                  padding: '10px 14px 6px',
                  fontSize: 9.5,
                  fontWeight: 700,
                  letterSpacing: '0.1em',
                  textTransform: 'uppercase',
                  color: section.color,
                  fontFamily: 'var(--font-mono)',
                }}>
                  {section.section}
                </div>
                {/* Lessons */}
                {section.lessons.map((lesson, li) => {
                  const isActive = activeLessonId === lesson.id;
                  const isDone   = completedSet.has(lesson.id);
                  return (
                    <button
                      key={li}
                      onClick={() => openLesson(selectedPath, lesson)}
                      style={{
                        display: 'flex',
                        alignItems: 'center',
                        gap: 9,
                        width: '100%',
                        padding: '8px 14px 8px 12px',
                        background: isActive ? `${selectedPath.color}15` : 'none',
                        border: 'none',
                        borderLeft: `3px solid ${isActive ? selectedPath.color : 'transparent'}`,
                        cursor: 'pointer',
                        textAlign: 'left',
                        transition: 'all 0.12s',
                        fontFamily: 'var(--font-ui)',
                      }}
                      onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = 'rgba(255,255,255,0.03)'; }}
                      onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = 'none'; }}
                    >
                      <div style={{
                        width: 18, height: 18, borderRadius: '50%', flexShrink: 0,
                        background: isDone ? selectedPath.color : isActive ? `${selectedPath.color}30` : 'var(--surface-3)',
                        border: `1.5px solid ${isDone ? selectedPath.color : isActive ? selectedPath.color : 'var(--border-strong)'}`,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: 7, color: isDone ? '#080810' : selectedPath.color, fontWeight: 800,
                      }}>
                        {isDone ? '✓' : li + 1}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12.5, fontWeight: isActive ? 700 : 500, color: isActive ? 'var(--text)' : isDone ? 'var(--text-muted)' : 'var(--text-faint)', lineHeight: 1.3, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                          {lesson.title}
                        </div>
                        {lesson.desc && (
                          <div style={{ fontSize: 10, color: 'var(--text-faint)', marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{lesson.desc}</div>
                        )}
                      </div>
                    </button>
                  );
                })}
              </div>
            ))}
          </div>
        </div>

        {/* MAIN CONTENT AREA */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden' }}>

          {/* Top bar with tabs and nav */}
          {activeLessonId && (
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '0 24px', height: 50,
              borderBottom: '1px solid var(--border)',
              background: 'rgba(8,8,16,0.8)',
              backdropFilter: 'blur(12px)',
              flexShrink: 0, gap: 16,
            }}>
              <div style={{ display: 'flex', gap: 4 }}>
                {[
                  { id: 'learn',    label: 'Learn'     },
                  { id: 'practice', label: 'Try It Yourself' },
                  { id: 'quiz',     label: 'Quiz'      },
                ].map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    style={{
                      background: activeTab === tab.id ? `${selectedPath.color}18` : 'none',
                      border: activeTab === tab.id ? `1px solid ${selectedPath.color}35` : '1px solid transparent',
                      borderRadius: 7,
                      padding: '5px 14px',
                      fontSize: 12.5,
                      fontWeight: activeTab === tab.id ? 700 : 500,
                      color: activeTab === tab.id ? selectedPath.color : 'var(--text-muted)',
                      cursor: 'pointer',
                      fontFamily: 'var(--font-ui)',
                      transition: 'all 0.15s',
                    }}
                  >
                    {tab.label}
                  </button>
                ))}
              </div>

              {/* Prev / Next nav */}
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                {completedSet.has(activeLessonId)
                  ? <span style={{ fontSize: 11.5, color: selectedPath.color, fontWeight: 700 }}>Completed</span>
                  : <button className="btn btn-teal btn-sm" onClick={markDone}>Mark Complete +120 XP</button>
                }
                <button
                  className="btn-ghost btn-sm"
                  onClick={() => prevLesson && goToLesson(prevLesson)}
                  disabled={!prevLesson}
                  style={{ opacity: prevLesson ? 1 : 0.3 }}
                >
                  &larr; Prev
                </button>
                <button
                  className="btn btn-sm"
                  style={{ background: selectedPath.color, color: '#080810', fontWeight: 700, opacity: nextLesson ? 1 : 0.3 }}
                  onClick={() => nextLesson && goToLesson(nextLesson)}
                  disabled={!nextLesson}
                >
                  Next &rarr;
                </button>
              </div>
            </div>
          )}

          {/* Content */}
          <div ref={contentRef} style={{ flex: 1, overflowY: 'auto', padding: '0 0 60px' }}>
            {loading ? (
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: 400, gap: 20 }}>
                <div className="spinner" style={{ width: 44, height: 44, borderTopColor: selectedPath.color }} />
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text-faint)' }}>Loading lesson...</div>
              </div>

            ) : !activeLessonId ? (
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '60vh', gap: 16, textAlign: 'center' }}>
                <div style={{ fontSize: 56 }}>{selectedPath.emoji}</div>
                <h2 style={{ fontSize: 24, fontWeight: 800, color: 'var(--text-muted)' }}>{selectedPath.title}</h2>
                <p style={{ color: 'var(--text-faint)', fontSize: 14, maxWidth: 340 }}>Pick a lesson from the left to get started.</p>
              </div>

            ) : !lesson ? (
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: 400, gap: 20 }}>
                <div className="spinner" style={{ width: 44, height: 44, borderTopColor: selectedPath.color }} />
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text-faint)' }}>Generating lesson...</div>
              </div>

            ) : activeTab === 'learn' ? (
              /* ---- LEARN TAB ---- */
              <div style={{ maxWidth: 820, margin: '0 auto', padding: '32px 32px 0' }}>
                {/* Breadcrumb */}
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 18, flexWrap: 'wrap' }}>
                  <span style={{ fontSize: 12, color: 'var(--text-faint)' }}>{selectedPath.title}</span>
                  <span style={{ color: 'var(--text-faint)', fontSize: 12 }}>/</span>
                  <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>{activeLessonMeta?.title}</span>
                </div>

                {/* Title */}
                <h1 style={{ fontSize: 34, fontWeight: 800, letterSpacing: '-0.02em', marginBottom: 12, lineHeight: 1.15 }}>
                  {lesson.title}
                </h1>

                {/* Introduction */}
                <div style={{
                  background: `${selectedPath.color}0d`,
                  border: `1px solid ${selectedPath.color}22`,
                  borderLeft: `4px solid ${selectedPath.color}`,
                  borderRadius: '0 10px 10px 0',
                  padding: '14px 18px',
                  marginBottom: 30,
                  fontSize: 15,
                  color: 'var(--text-muted)',
                  lineHeight: 1.7,
                }}>
                  {lesson.introduction}
                </div>

                {/* Sections */}
                {(lesson.sections || []).map((sec, i) => (
                  <div key={i} style={{ marginBottom: 36 }}>
                    <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 12, letterSpacing: '-0.01em', color: 'var(--text)' }}>
                      {sec.heading}
                    </h2>
                    <div
                      style={{ fontSize: 14.5, lineHeight: 1.8, color: 'var(--text-muted)', marginBottom: sec.code ? 16 : 0 }}
                      dangerouslySetInnerHTML={{ __html: renderBody(sec.body) }}
                    />
                    {sec.code && sec.code.trim() && (
                      <div style={{ borderRadius: 10, overflow: 'hidden', border: '1px solid var(--border-strong)' }}>
                        {/* Code block header */}
                        <div style={{
                          background: '#0c0c18',
                          padding: '9px 16px',
                          display: 'flex',
                          justifyContent: 'space-between',
                          alignItems: 'center',
                          borderBottom: '1px solid var(--border)',
                        }}>
                          <div style={{ display: 'flex', gap: 5 }}>
                            {['#ff5f57', '#ffbd2e', '#28ca41'].map((c, j) => (
                              <div key={j} style={{ width: 10, height: 10, borderRadius: '50%', background: c }} />
                            ))}
                          </div>
                          <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--text-faint)' }}>
                            {sec.language || 'code'}
                          </span>
                          <button
                            onClick={() => { navigator.clipboard?.writeText(sec.code); }}
                            style={{ background: 'none', border: '1px solid var(--border)', borderRadius: 5, padding: '3px 10px', fontSize: 10.5, color: 'var(--text-muted)', cursor: 'pointer', fontFamily: 'var(--font-ui)' }}
                          >
                            Copy
                          </button>
                        </div>
                        <pre style={{ background: '#06060e', padding: '18px 20px', margin: 0, fontFamily: 'var(--font-mono)', fontSize: 13, lineHeight: 1.9, color: '#9effd8', overflowX: 'auto' }}>
                          <code>{sec.code}</code>
                        </pre>
                      </div>
                    )}
                  </div>
                ))}

                {/* Key Points */}
                {lesson.keyPoints && lesson.keyPoints.length > 0 && (
                  <div style={{ background: 'var(--surface-2)', border: '1px solid var(--border-strong)', borderRadius: 10, padding: '18px 20px', marginBottom: 28 }}>
                    <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 12, color: 'var(--text)' }}>Key Takeaways</div>
                    {lesson.keyPoints.map((pt, i) => (
                      <div key={i} style={{ display: 'flex', gap: 10, marginBottom: 8, alignItems: 'flex-start' }}>
                        <div style={{ width: 6, height: 6, borderRadius: '50%', background: selectedPath.color, marginTop: 7, flexShrink: 0 }} />
                        <span style={{ fontSize: 13.5, color: 'var(--text-muted)', lineHeight: 1.6 }}>{pt}</span>
                      </div>
                    ))}
                  </div>
                )}

                {/* What next */}
                {lesson.whatNext && (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 18px', background: 'var(--surface-1)', border: '1px solid var(--border)', borderRadius: 10, marginBottom: 28 }}>
                    <span style={{ fontSize: 22 }}>📌</span>
                    <div style={{ fontSize: 13.5, color: 'var(--text-muted)' }}>
                      <strong style={{ color: 'var(--text)' }}>What to learn next: </strong>
                      {lesson.whatNext}
                    </div>
                    {nextLesson && (
                      <button
                        className="btn btn-teal btn-sm"
                        style={{ marginLeft: 'auto', flexShrink: 0 }}
                        onClick={() => goToLesson(nextLesson)}
                      >
                        {nextLesson.title} &rarr;
                      </button>
                    )}
                  </div>
                )}

                {/* Bottom nav */}
                <div style={{ display: 'flex', justifyContent: 'space-between', paddingTop: 16, borderTop: '1px solid var(--border)', marginBottom: 40 }}>
                  <button
                    className="btn btn-ghost"
                    onClick={() => prevLesson && goToLesson(prevLesson)}
                    disabled={!prevLesson}
                    style={{ opacity: prevLesson ? 1 : 0.3 }}
                  >
                    &larr; {prevLesson ? prevLesson.title : 'Previous'}
                  </button>
                  <button
                    className="btn"
                    style={{ background: selectedPath.color, color: '#080810', fontWeight: 700, opacity: nextLesson ? 1 : 0.3 }}
                    onClick={() => nextLesson && goToLesson(nextLesson)}
                    disabled={!nextLesson}
                  >
                    {nextLesson ? nextLesson.title : 'Next'} &rarr;
                  </button>
                </div>
              </div>

            ) : activeTab === 'practice' ? (
              /* ---- TRY IT YOURSELF TAB ---- */
              <div style={{ display: 'flex', flexDirection: 'column', height: '100%', padding: '20px 24px' }}>
                <div style={{ marginBottom: 14 }}>
                  <h2 style={{ fontSize: 20, fontWeight: 800, letterSpacing: '-0.02em', marginBottom: 6 }}>Try It Yourself</h2>
                  <div style={{
                    background: `${selectedPath.color}0d`,
                    border: `1px solid ${selectedPath.color}22`,
                    borderRadius: 9, padding: '10px 14px',
                    fontSize: 13.5, color: 'var(--text-muted)', lineHeight: 1.6,
                  }}>
                    {lesson.tryItYourself?.instruction || 'Edit the code below and try running it in your browser console.'}
                  </div>
                </div>

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, flex: 1, minHeight: 0 }}>
                  {/* Editor */}
                  <div style={{ display: 'flex', flexDirection: 'column', borderRadius: 10, overflow: 'hidden', border: '1px solid var(--border-strong)' }}>
                    <div style={{ background: '#0c0c18', padding: '9px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
                      <div style={{ display: 'flex', gap: 5 }}>
                        {['#ff5f57', '#ffbd2e', '#28ca41'].map((c, j) => <div key={j} style={{ width: 9, height: 9, borderRadius: '50%', background: c }} />)}
                      </div>
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--text-faint)' }}>
                        {lesson.tryItYourself?.language || 'javascript'}
                      </span>
                      <button
                        onClick={() => setUserCode(lesson.tryItYourself?.starterCode || '')}
                        style={{ background: 'none', border: '1px solid var(--border)', borderRadius: 5, padding: '3px 10px', fontSize: 10.5, color: 'var(--text-muted)', cursor: 'pointer', fontFamily: 'var(--font-ui)' }}
                      >
                        Reset
                      </button>
                    </div>
                    <textarea
                      value={userCode}
                      onChange={e => setUserCode(e.target.value)}
                      className="code-editor"
                      style={{ flex: 1, borderRadius: 0, border: 'none', resize: 'none', minHeight: 340 }}
                    />
                    <div style={{ background: '#0c0c18', padding: '9px 14px', borderTop: '1px solid var(--border)', flexShrink: 0 }}>
                      <button
                        className="btn"
                        style={{ background: selectedPath.color, color: '#080810', fontWeight: 700, fontSize: 12.5, padding: '7px 18px' }}
                        onClick={() => {
                          try {
                            const logs = [];
                            const fakeConsole = { log: (...args) => logs.push(args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ')) };
                            const fn = new Function('console', userCode);
                            fn(fakeConsole);
                            setCodeOutput(logs.length > 0 ? logs.join('\n') : '(no console output — add console.log() to see results)');
                          } catch (err) {
                            setCodeOutput('Error: ' + err.message);
                          }
                        }}
                      >
                        Run Code
                      </button>
                    </div>
                  </div>

                  {/* Output */}
                  <div style={{ display: 'flex', flexDirection: 'column', borderRadius: 10, overflow: 'hidden', border: '1px solid var(--border-strong)' }}>
                    <div style={{ background: '#0c0c18', padding: '9px 14px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
                      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--text-faint)' }}>Output</span>
                    </div>
                    <div style={{ flex: 1, background: '#06060e', padding: '16px 18px', fontFamily: 'var(--font-mono)', fontSize: 13, lineHeight: 1.8, color: codeOutput.startsWith('Error') ? '#f87171' : '#9effd8', overflowY: 'auto', whiteSpace: 'pre-wrap' }}>
                      {codeOutput || <span style={{ color: 'var(--text-faint)' }}>Click Run Code to see output here.</span>}
                    </div>
                  </div>
                </div>
              </div>

            ) : activeTab === 'quiz' ? (
              /* ---- QUIZ TAB ---- */
              <div style={{ maxWidth: 620, margin: '0 auto', padding: '36px 24px' }}>
                <h2 style={{ fontSize: 22, fontWeight: 800, letterSpacing: '-0.02em', marginBottom: 6 }}>Quick Quiz</h2>
                <p style={{ color: 'var(--text-faint)', fontSize: 13, marginBottom: 28 }}>Test your understanding of this lesson.</p>

                {lesson.quiz ? (
                  <>
                    <div style={{ background: 'var(--surface-2)', border: '1px solid var(--border-strong)', borderRadius: 12, padding: '20px 22px', marginBottom: 20 }}>
                      <p style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.5, marginBottom: 4, color: 'var(--text)' }}>
                        {lesson.quiz.question}
                      </p>
                    </div>

                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 24 }}>
                      {(lesson.quiz.options || []).map((opt, i) => {
                        let bg = 'var(--surface-2)';
                        let borderColor = 'var(--border-strong)';
                        let color = 'var(--text-muted)';

                        if (quizChecked) {
                          if (i === lesson.quiz.correctIndex) { bg = 'rgba(34,197,94,0.12)'; borderColor = '#22c55e'; color = '#4ade80'; }
                          else if (i === quizAnswer)           { bg = 'rgba(239,68,68,0.1)';  borderColor = 'var(--red)'; color = '#f87171'; }
                        } else if (quizAnswer === i) {
                          bg = `${selectedPath.color}15`; borderColor = selectedPath.color; color = 'var(--text)';
                        }

                        return (
                          <button
                            key={i}
                            onClick={() => { if (!quizChecked) setQuizAnswer(i); }}
                            style={{
                              display: 'flex', alignItems: 'center', gap: 12,
                              padding: '13px 16px', borderRadius: 9,
                              background: bg, border: `1.5px solid ${borderColor}`,
                              cursor: quizChecked ? 'default' : 'pointer',
                              textAlign: 'left', transition: 'all 0.15s', fontFamily: 'var(--font-ui)',
                            }}
                          >
                            <div style={{
                              width: 26, height: 26, borderRadius: '50%', flexShrink: 0,
                              background: quizAnswer === i && !quizChecked ? selectedPath.color : 'var(--surface-3)',
                              border: `1.5px solid ${borderColor}`,
                              display: 'flex', alignItems: 'center', justifyContent: 'center',
                              fontFamily: 'var(--font-mono)', fontSize: 10, fontWeight: 700, color,
                            }}>
                              {String.fromCharCode(65 + i)}
                            </div>
                            <span style={{ fontSize: 14, color, fontWeight: quizAnswer === i ? 600 : 400 }}>{opt}</span>
                            {quizChecked && i === lesson.quiz.correctIndex && (
                              <span style={{ marginLeft: 'auto', color: '#4ade80', fontSize: 16 }}>✓</span>
                            )}
                            {quizChecked && i === quizAnswer && i !== lesson.quiz.correctIndex && (
                              <span style={{ marginLeft: 'auto', color: '#f87171', fontSize: 16 }}>✗</span>
                            )}
                          </button>
                        );
                      })}
                    </div>

                    {!quizChecked ? (
                      <button
                        className="btn btn-teal"
                        onClick={() => { if (quizAnswer !== null) setQuizChecked(true); }}
                        disabled={quizAnswer === null}
                        style={{ opacity: quizAnswer === null ? 0.45 : 1 }}
                      >
                        Check Answer
                      </button>
                    ) : (
                      <div>
                        <div style={{
                          padding: '14px 18px', borderRadius: 10, marginBottom: 16,
                          background: quizAnswer === lesson.quiz.correctIndex ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.09)',
                          border: `1px solid ${quizAnswer === lesson.quiz.correctIndex ? '#22c55e' : 'var(--red)'}`,
                        }}>
                          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 5, color: quizAnswer === lesson.quiz.correctIndex ? '#4ade80' : '#f87171' }}>
                            {quizAnswer === lesson.quiz.correctIndex ? 'Correct!' : 'Not quite'}
                          </div>
                          <p style={{ fontSize: 13.5, color: 'var(--text-muted)', lineHeight: 1.6 }}>{lesson.quiz.explanation}</p>
                        </div>
                        <div style={{ display: 'flex', gap: 10 }}>
                          <button className="btn btn-ghost" onClick={() => { setQuizAnswer(null); setQuizChecked(false); }}>Try Again</button>
                          {nextLesson && (
                            <button className="btn" style={{ background: selectedPath.color, color: '#080810', fontWeight: 700 }} onClick={() => goToLesson(nextLesson)}>
                              Next Lesson &rarr;
                            </button>
                          )}
                        </div>
                      </div>
                    )}
                  </>
                ) : (
                  <p style={{ color: 'var(--text-faint)' }}>No quiz available for this lesson.</p>
                )}
              </div>
            ) : null}
          </div>
        </div>
      </div>
    );
  }

                    </p>
                    <div style={{ display: 'flex', gap: 5, marginBottom: 10, flexWrap: 'wrap' }}>
                      {post.tags.map((t, j) => <span key={j} className="tag tag-muted">{t}</span>)}
                    </div>
                    <div style={{ display: 'flex', gap: 14 }}>
                      <button
                        onClick={() => toggleLike(post.id)}
                        style={{
                          background: 'none', border: 'none',
                          fontSize: 12, color: likedPosts.has(post.id) ? 'var(--red)' : 'var(--text-faint)',
                          cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4,
                          padding: 0, transition: 'color 0.12s',
                          fontFamily: 'var(--font-ui)', fontWeight: likedPosts.has(post.id) ? 700 : 400,
                        }}
                      >
                        {likedPosts.has(post.id) ? '♥' : '♡'} {post.likes + (likedPosts.has(post.id) ? 1 : 0)} likes
                      </button>
                      <button style={{ background: 'none', border: 'none', fontSize: 12, color: 'var(--text-faint)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, padding: 0, fontFamily: 'var(--font-ui)' }}
                        onMouseEnter={e => e.currentTarget.style.color = 'var(--text)'}
                        onMouseLeave={e => e.currentTarget.style.color = 'var(--text-faint)'}>
                        {post.comments} comments
                      </button>
                      <button style={{ background: 'none', border: 'none', fontSize: 12, color: 'var(--text-faint)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, padding: 0, fontFamily: 'var(--font-ui)' }}
                        onMouseEnter={e => e.currentTarget.style.color = 'var(--text)'}
                        onMouseLeave={e => e.currentTarget.style.color = 'var(--text-faint)'}>
                        Share
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <aside style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {/* Trending */}
            <div className="card" style={{ borderColor: 'rgba(249,115,22,0.15)' }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 8, color: 'var(--orange-light)', letterSpacing: '0.12em', marginBottom: 12, fontWeight: 700 }}>
                TRENDING THIS WEEK
              </div>
              {trending.map((tag, i) => (
                <div key={i} className="trending-row">
                  <span
                    style={{ fontSize: 13, color: 'var(--orange-light)', cursor: 'pointer', fontWeight: 600, transition: 'color 0.12s' }}
                    onMouseEnter={e => e.currentTarget.style.color = 'var(--text)'}
                    onMouseLeave={e => e.currentTarget.style.color = 'var(--orange-light)'}
                  >
                    {tag}
                  </span>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9.5, color: 'var(--text-faint)' }}>
                    {[430, 380, 290, 260, 210, 190, 140][i]}
                  </span>
                </div>
              ))}
            </div>

            {/* Active cities */}
            <div className="card">
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 8, color: 'var(--text-faint)', letterSpacing: '0.12em', marginBottom: 12, fontWeight: 700 }}>
                ACTIVE CITIES
              </div>
              {cities.map(([city, count], i) => (
                <div key={i} className="city-row">
                  <span style={{ fontSize: 13 }}>{city}</span>
                  <div style={{ textAlign: 'right' }}>
                    <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--teal-light)', fontWeight: 700 }}>{count.toLocaleString()}</div>
                    <div style={{ height: 2, width: 55, background: 'var(--surface-3)', borderRadius: 1, overflow: 'hidden', marginTop: 3 }}>
                      <div style={{ height: '100%', width: `${Math.round(count / 12400 * 100)}%`, background: 'linear-gradient(90deg, var(--teal), var(--violet))' }} />
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Event promo */}
            <div className="card" style={{ borderColor: 'rgba(20,184,166,0.15)' }}>
              <div style={{ fontSize: 26, marginBottom: 9 }}>🏆</div>
              <div style={{ fontSize: 15, fontWeight: 800, marginBottom: 5 }}>AWS AI for Bharat</div>
              <p style={{ fontSize: 12.5, color: 'var(--text-muted)', marginBottom: 14, lineHeight: 1.6 }}>
                Register before March 30. Compete and connect with AWS engineers from across India.
              </p>
              <button className="btn btn-teal" style={{ width: '100%', justifyContent: 'center' }}>Register Now</button>
            </div>
          </aside>
        </div>
      </div>

      {/* ---- Write a Post Modal ---- */}
      {showModal && (
        <div
          style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.72)', backdropFilter: 'blur(6px)', zIndex: 2000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}
          onClick={e => { if (e.target === e.currentTarget) setShowModal(false); }}
        >
          <div style={{ background: 'var(--surface-1)', border: '1px solid var(--border-strong)', borderRadius: 16, width: '100%', maxWidth: 600, padding: 28, animation: 'fadeIn 0.2s ease' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 22 }}>
              <h2 style={{ fontSize: 20, fontWeight: 800, letterSpacing: '-0.02em' }}>Write a Post</h2>
              <button
                onClick={() => setShowModal(false)}
                style={{ background: 'var(--surface-3)', border: 'none', color: 'var(--text-muted)', width: 30, height: 30, borderRadius: '50%', cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center' }}
              >
                &times;
              </button>
            </div>

            {/* Category */}
            <div style={{ marginBottom: 14 }}>
              <label className="field-label">Category</label>
              <select
                value={postCategory}
                onChange={e => setPostCategory(e.target.value)}
                style={{ width: '100%', padding: '9px 12px' }}
              >
                {['Career', 'AWS', 'Startup', 'Open Source', 'Tutorial', 'Question', 'Hiring', 'Showcase'].map(c => (
                  <option key={c} value={c}>{c}</option>
                ))}
              </select>
            </div>

            {/* Body first — used by AI to suggest title */}
            <div style={{ marginBottom: 14 }}>
              <label className="field-label">Your Story / Question</label>
              <textarea
                value={postBody}
                onChange={e => setPostBody(e.target.value)}
                placeholder="Share what you built, learned, or want help with. Be specific — the community loves real stories."
                style={{ width: '100%', padding: '10px 13px', minHeight: 110, resize: 'vertical', lineHeight: 1.65, borderRadius: 10 }}
              />
            </div>

            {/* Title with AI suggestion */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 5 }}>
                <label className="field-label" style={{ margin: 0 }}>Post Title</label>
                <button
                  onClick={suggestTitle}
                  disabled={aiLoading || !postBody.trim()}
                  style={{
                    background: 'none', border: '1px solid var(--border-strong)',
                    borderRadius: 7, padding: '3px 11px', fontSize: 11.5,
                    color: aiLoading ? 'var(--text-faint)' : 'var(--teal-light)',
                    cursor: postBody.trim() ? 'pointer' : 'not-allowed',
                    fontFamily: 'var(--font-ui)', fontWeight: 600,
                    opacity: postBody.trim() ? 1 : 0.45,
                  }}
                >
                  {aiLoading ? 'Thinking...' : 'AI Suggest Title'}
                </button>
              </div>
              <input
                type="text"
                value={postTitle}
                onChange={e => setPostTitle(e.target.value)}
                placeholder="Write a catchy title or use AI to suggest one"
                style={{ width: '100%', padding: '9px 13px', borderRadius: 10 }}
              />
            </div>

            {/* Tags */}
            <div style={{ marginBottom: 22 }}>
              <label className="field-label">Tags (comma separated)</label>
              <input
                type="text"
                value={postTags}
                onChange={e => setPostTags(e.target.value)}
                placeholder="e.g. React, AWS, UPI"
                style={{ width: '100%', padding: '9px 13px', borderRadius: 10 }}
              />
            </div>

            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
              <button className="btn-ghost" onClick={() => setShowModal(false)}>Cancel</button>
              <button
                className="btn btn-orange"
                onClick={submitPost}
                disabled={!postTitle.trim() || !postBody.trim() || submitting}
                style={{ opacity: (!postTitle.trim() || !postBody.trim()) ? 0.5 : 1 }}
              >
                {submitting ? 'Publishing...' : 'Publish Post'}
              </button>
            </div>
          </div>
        </div>
      )}
      </>
    );
  }

  // ----- Root App -----
  function App() {
    const [currentPage, setCurrentPage] = useState('dashboard');
    const [lang, setLang] = useState('en');
    const [xp, setXp] = useState(7240);
    const [toastData, setToastData] = useState(null);
    const [showConfetti, setShowConfetti] = useState(false);
    const streak = 14;

    const showToast = useCallback((data) => {
      setToastData(data);
      if (data.title.toLowerCase().includes('complete') || data.title.toLowerCase().includes('done')) {
        setShowConfetti(true);
        setTimeout(() => setShowConfetti(false), 3800);
      }
      if (data.xpGain) {
        const amount = parseInt(data.xpGain.replace(/\D/g, '') || '0');
        if (amount > 0) setXp(prev => prev + amount);
      }
    }, []);

    const pageMap = {
      dashboard: DashboardPage,
      mentor:    MentorPage,
      review:    CodeReviewPage,
      learn:     LearnPage,
      career:    CareerPage,
      community: CommunityPage,
    };

    const CurrentPage = pageMap[currentPage] || DashboardPage;

    return (
      <div id="app">
        <div className="bg-blobs">
          <span />
          <span />
          <span />
        </div>

        <Navbar
          currentPage={currentPage}
          setCurrentPage={setCurrentPage}
          lang={lang}
          setLang={setLang}
          xp={xp}
          streak={streak}
        />

        <main style={{ flex: 1, position: 'relative', zIndex: 1 }}>
          <CurrentPage
            setCurrentPage={setCurrentPage}
            lang={lang}
            xp={xp}
            setXp={setXp}
            streak={streak}
            showToast={showToast}
          />
        </main>

        <footer>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--text-faint)' }}>
              DevMentor — AI for Bharat Hackathon — Claude + AWS Bedrock
            </span>
            <span style={{ fontFamily: 'var(--font-devanagari)', fontSize: 12, color: 'var(--text-faint)' }}>
              भारत के लिए बनाया गया
            </span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <div style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--teal)', boxShadow: '0 0 6px var(--teal)' }} />
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--teal)' }}>Live</span>
          </div>
        </footer>

        <Confetti show={showConfetti} />
        {toastData && <Toast data={toastData} onClose={() => setToastData(null)} />}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
